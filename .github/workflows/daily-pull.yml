name: daily-pull

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-pull
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  pull:
    runs-on: ubuntu-latest
    env:
      VERCEL_DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Restore previous DB
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p db
          LATEST=$(gh run list --workflow=daily-pull.yml --status=success --branch=main --limit 1 --json databaseId --jq '.[0].databaseId // empty')
          if [ -z "$LATEST" ]; then
            echo "no previous successful run, starting with empty DB"
            exit 0
          fi
          echo "restoring quotes-db from run $LATEST"
          gh run download "$LATEST" -n quotes-db -D db/ 2>&1 || echo "no quotes-db artifact yet, starting fresh"
          ls -la db/ || true

      - name: Pull daily quotes
        env:
          NEXT_PUBLIC_LIFI_API_KEY: ${{ secrets.NEXT_PUBLIC_LIFI_API_KEY }}
          INTEGRATOR_STRING: ${{ vars.INTEGRATOR_STRING }}
        run: pnpm pull:daily

      - name: Upload DB artifact
        uses: actions/upload-artifact@v4
        with:
          name: quotes-db
          path: db/quotes.db
          retention-days: 90
          if-no-files-found: error

      - name: Build snapshots
        run: pnpm snapshots

      - name: Publish data branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          cd web/public/data
          # disable any Vercel project from auto-deploying this branch
          printf '%s\n' '{"git":{"deploymentEnabled":false}}' > vercel.json
          git init -q -b data
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -q -m "data: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push -fq "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" HEAD:data

      - name: Trigger Vercel redeploy
        if: ${{ env.VERCEL_DEPLOY_HOOK_URL != '' }}
        run: curl -fsS -X POST "$VERCEL_DEPLOY_HOOK_URL"
